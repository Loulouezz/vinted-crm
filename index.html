<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinted CRM FINAL BOSS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:-apple-system;background:#0f172a;color:#fff}
header{padding:15px;text-align:center;font-size:22px;font-weight:700;background:#020617}
.container{max-width:1200px;margin:auto;padding:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.card{background:#020617;padding:12px;border-radius:14px;box-shadow:0 8px 25px rgba(0,0,0,.3)}
input,select{padding:7px;border-radius:8px;border:none;margin:4px;width:100%}
button{padding:8px;border:none;border-radius:10px;background:#09B1BA;color:#fff;cursor:pointer;width:100%}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #333;font-size:13px}
.green{color:#22c55e}
.red{color:#ef4444}
.big{font-size:18px;font-weight:600}
</style>
</head>
<body>
<header>🔥 Vinted CRM FINAL BOSS</header>

<div class="container">

<div class="grid">
<div class="card">
<h4>➕ Vente</h4>
<input id="name" placeholder="Nom">
<input id="price" type="number" placeholder="Prix vente">
<input id="cost" type="number" placeholder="Prix achat">
<select id="cat">
<option>Vêtements</option>
<option>Chaussures</option>
<option>Accessoires</option>
<option>Autre</option>
</select>
<button onclick="addSale()">Ajouter</button>
</div>

<div class="card">
<h4>🧠 Analyse produit</h4>
<input id="buyPrice" type="number" placeholder="Prix achat">
<input id="sellPrice" type="number" placeholder="Prix revente estimé">
<button onclick="analyze()">Analyser</button>
<p id="analysis"></p>
</div>

<div class="card">
<h4>📦 Stock</h4>
<input id="sname" placeholder="Nom">
<input id="scost" type="number" placeholder="Prix achat">
<button onclick="addStock()">Ajouter</button>
<ul id="stockList"></ul>
</div>

<div class="card">
<h4>📊 KPI</h4>
<p id="kpi" class="big"></p>
</div>
</div>

<div class="card">
<h4>📈 Performance</h4>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h4>📅 Analyse mensuelle</h4>
<canvas id="month"></canvas>
</div>

<div class="card">
<h4>📦 Ventes</h4>
<table>
<thead><tr><th>Nom</th><th>Cat</th><th>Profit</th><th>ROI</th></tr></thead>
<tbody id="list"></tbody>
</table>
</div>

<div class="card">
<h4>🤖 IA STRATÉGIE</h4>
<p id="ai"></p>
</div>

<div class="card">
<h4>📤 Export</h4>
<button onclick="exportCSV()">CSV</button>
<button onclick="window.print()">PDF</button>
</div>

</div>

<script>
let sales=JSON.parse(localStorage.getItem("sales")||"[]")
let stock=JSON.parse(localStorage.getItem("stock")||"[]")

function save(){
localStorage.setItem("sales",JSON.stringify(sales))
localStorage.setItem("stock",JSON.stringify(stock))
}

function addSale(){
const s={name:name.value,price:+price.value,cost:+cost.value,cat:cat.value,date:new Date().toISOString()}
sales.push(s)
save();render()
}

function addStock(){
stock.push({name:sname.value,cost:+scost.value})
save();render()
}

function analyze(){
const buy=+buyPrice.value
const sell=+sellPrice.value
const frais=sell*0.05+0.7
const profit=sell-buy-frais
const roi=buy?((profit/buy)*100).toFixed(0):0
analysis.innerText=`Profit: ${profit.toFixed(2)}€ | ROI: ${roi}%`
}

function exportCSV(){
let csv="nom,prix,achat\n"
sales.forEach(s=>{csv+=`${s.name},${s.price},${s.cost}\n`})
const blob=new Blob([csv])
const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="data.csv"
a.click()
}

function render(){
let ca=0,ben=0
let catStats={}
list.innerHTML=""

sales.forEach(s=>{
const profit=s.price-s.cost
const roi=s.cost?((profit/s.cost)*100).toFixed(0):0
ca+=s.price
ben+=profit
catStats[s.cat]=(catStats[s.cat]||0)+profit
list.innerHTML+=`<tr>
<td>${s.name}</td>
<td>${s.cat}</td>
<td class="${profit>=0?'green':'red'}">${profit}€</td>
<td>${roi}%</td>
</tr>`
})

const frais=ca*0.05+sales.length*0.7
ben-=frais

kpi.innerText=`CA ${ca}€ | Profit ${ben.toFixed(2)}€`

if(window.chart) chart.destroy()
window.chart=new Chart(document.getElementById("chart"),{
type:'bar',data:{labels:sales.map(s=>s.name),datasets:[{data:sales.map(s=>s.price-s.cost)}]}
})

let months={}
sales.forEach(s=>{
const m=s.date.slice(0,7)
months[m]=(months[m]||0)+(s.price-s.cost)
})

if(window.monthChart) monthChart.destroy()
window.monthChart=new Chart(document.getElementById("month"),{
type:'line',data:{labels:Object.keys(months),datasets:[{data:Object.values(months)}]}
})

stockList.innerHTML=stock.map(s=>`<li>${s.name} (${s.cost}€)</li>`).join("")

let bestCat=Object.entries(catStats).sort((a,b)=>b[1]-a[1])[0]
if(bestCat){ai.innerText=`🔥 Focus: ${bestCat[0]}\n📈 Achète + dans cette catégorie`}
if(ben<0){ai.innerText+="\n⚠️ Stop pertes"}
}

render()
</script>

</body>
</html>
